spring.datasource.url=${DB_URL:jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=FashionShopDB;trustServerCertificate=true;encrypt=false}
spring.datasource.username=${DB_USERNAME:springuser}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
groq.api.key=${GROQ_API_KEY:}
groq.api.url=${GROQ_API_URL:https://api.groq.com/openai/v1/chat/completions}
groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.admin-override-token=${APP_ADMIN_OVERRIDE_TOKEN:}
